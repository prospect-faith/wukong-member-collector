services:
  - type: web
    name: wukong-member-collector
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_TOKEN
        sync: false
    disk:
      name: submissions
      mountPath: /var/data
      sizeGB: 1
