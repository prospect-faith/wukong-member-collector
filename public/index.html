<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta property="og:title" content="悟空租车 - 政企会员升级">
    <meta property="og:description" content="校友专享金钻会员权益">
    <title>悟空租车 - 政企会员升级</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-label="悟空租车校友专享">
        <img class="brand-logo" src="assets/wukong-logo.png" alt="悟空租车">

        <h1>校友专享<br>金钻会员权益</h1>
        <p class="subtitle">中央财经大学 × 悟空租车 · 校友专享</p>

        <img class="mascot" src="assets/wukong-mascot.png" alt="" aria-hidden="true">
      </section>

      <section class="notice">
        <p>您好！</p>
        <p>您正在通过手机号绑定<span>悟空租车会员</span>，</p>
        <p>验证校友身份后即可升级<span>悟空租车金钻会员</span></p>
      </section>

      <section class="form-panel" aria-label="会员信息填写">
        <form id="memberForm" novalidate>
          <label for="phone"><b>*</b> 手机号码</label>
          <input id="phone" name="phone" type="tel" inputmode="numeric" autocomplete="tel" maxlength="11" placeholder="请输入手机号码" required>

          <label for="alumniId"><b>*</b> 校友卡号</label>
          <input id="alumniId" name="alumniId" type="text" inputmode="text" autocomplete="off" maxlength="32" placeholder="请输入校友卡号" required>

          <button type="submit" id="submitButton">下一步</button>
          <p class="form-message" id="formMessage" role="status"></p>
        </form>
      </section>

      <section class="benefits" aria-label="金钻会员权益">
        <h2><span aria-hidden="true">🎁</span> 金钻会员专属权益</h2>
        <div class="benefit-list">
          <article class="benefit-item">
            <span class="benefit-icon">💰</span>
            <div>
              <h3>整单95折</h3>
              <p>租车订单整单享95折优惠</p>
            </div>
          </article>
          <article class="benefit-item">
            <span class="benefit-icon">🛡️</span>
            <div>
              <h3>保障专享8折</h3>
              <p>保障服务专享8折优惠</p>
            </div>
          </article>
          <article class="benefit-item">
            <span class="benefit-icon">⛽</span>
            <div>
              <h3>加油服务费减免</h3>
              <p>全年4次加油服务费减免</p>
            </div>
          </article>
          <article class="benefit-item">
            <span class="benefit-icon">🎂</span>
            <div>
              <h3>生日礼包</h3>
              <p>满300减100专属优惠券</p>
            </div>
          </article>
        </div>
      </section>
    </main>

    <div class="success-modal" id="successModal" hidden>
      <div class="success-modal__backdrop" data-close-success></div>
      <div class="success-modal__panel" role="dialog" aria-modal="true" aria-labelledby="successTitle">
        <div class="success-modal__icon" aria-hidden="true">✓</div>
        <h2 id="successTitle">提交成功</h2>
        <p>会员升级信息已登记，请等待后续处理。</p>
        <button type="button" id="successClose">知道了</button>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
  </body>
</html>
